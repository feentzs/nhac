name: nhac
description: Delivery Simples e Prático.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  animated_splash_screen: ^1.3.0
  nowa_runtime: ^0.1.3
  provider: ^6.1.5
  shared_preferences: ^2.5.4
  dio: ^5.9.1
  lottie: ^2.7.0
  go_router: ^17.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto.ttf
