name: nhac
description: Delivery Simples e Prático.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  animated_splash_screen: ^1.3.0
  nowa_runtime: ^0.1.3
  provider: ^6.1.5
  shared_preferences: ^2.5.4
  dio: ^5.9.1
  lottie: ^2.7.0
  go_router: ^17.1.0
  sign_in_button: ^3.2.0
  pin_code_fields: ^8.0.1
  flutter_svg: ^2.2.3
  mask_text_input_formatter: ^2.9.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_sign_in: ^6.2.2
  email_validator: ^3.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto.ttf

flutter_native_splash:
  color: "#FFFFFF" 
  image: assets/transparente.png
  android_12:
    color: "#FFFFFF" 
    image: assets/transparente.png