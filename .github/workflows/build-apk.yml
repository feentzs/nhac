name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/codemagic.keystore

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release
        env:
          CM_BUILD_DIR: ${{ github.workspace }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Pre-Release v1.0.${{ github.run_number }}"
          prerelease: true
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
