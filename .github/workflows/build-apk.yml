name: Build APK

on:
  push:
    branches:
      - main
      - eu-e-tu
  workflow_dispatch:

jobs:

  # ── Build DEBUG (branch: eu-e-tu) ────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    if: github.ref == 'refs/heads/eu-e-tu'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ── Build RELEASE (branch: main) ─────────────────────────────────────────
  build-release:
    name: Build Release APK
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/codemagic.keystore

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release
        env:
          CM_BUILD_DIR: ${{ github.workspace }}
          CM_KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          CM_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          CM_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.${{ github.run_number }}.0"
          name: "Pre-Release v0.${{ github.run_number }}.0"
          prerelease: true
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/app-release.apk
